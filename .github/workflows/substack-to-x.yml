name: Post Substack to X

on:
  workflow_dispatch:         # Manual trigger only — disabled auto-schedule (X API secrets not configured)

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit state updates
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Check for new posts and tweet
        working-directory: scripts
        run: node check-and-post.js
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      - name: Commit state update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last-posted.json
          git diff --staged --quiet || git commit -m "chore: update last-posted state"
          git push
